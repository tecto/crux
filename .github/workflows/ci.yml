name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-python:
    name: Python Tests (100% coverage)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-cov pytest-bdd mcp

      - name: Run tests with coverage gate
        run: python3 -m pytest tests/ -v --tb=short --cov=scripts/lib --cov-report=term-missing --cov-fail-under=100

  test-node:
    name: Node Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tests
        run: node --test tests/*.test.js

  test-bats:
    name: Bash Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats
        run: |
          git clone https://github.com/bats-core/bats-core.git /tmp/bats
          /tmp/bats/install.sh /usr/local

      - name: Run tests
        run: bats tests/*.bats
